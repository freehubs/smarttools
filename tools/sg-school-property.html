<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #6366f1;
    --primary-light: #818cf8;
    --primary-dark: #4f46e5;
    --accent: #dc2626;
    --accent-light: #f87171;
    --surface: #ffffff;
    --surface-alt: #f8fafc;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-secondary: #64748b;
    --text-tertiary: #94a3b8;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --condo: #8b5cf6;
    --hdb: #0ea5e9;
    --ec: #d946ef;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
    background: linear-gradient(135deg, #fff1f2 0%, #ffe4e6 50%, #fce7f3 100%);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  .container { max-width: 1060px; margin: 0 auto; padding: 32px 20px 64px; }

  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  header p { color: var(--text-secondary); font-size: 13px; max-width: 600px; margin: 0 auto; }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 24px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 15px; font-weight: 600; color: var(--text);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }

  .card-title .icon {
    width: 26px; height: 26px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }

  /* Map */
  #map { height: 420px; border-radius: var(--radius); border: 1px solid var(--border); z-index: 1; }

  /* Filters */
  .filter-bar {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px;
    align-items: center;
  }
  .filter-bar select, .filter-bar input {
    padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 13px; background: var(--surface); color: var(--text);
    outline: none; cursor: pointer;
  }
  .filter-bar select:focus, .filter-bar input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99,102,241,.1);
  }
  .filter-bar .filter-label {
    font-size: 12px; color: var(--text-secondary); font-weight: 500;
  }
  .filter-count {
    margin-left: auto; font-size: 12px; color: var(--text-tertiary);
  }

  /* School Grid */
  .school-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }

  .school-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: transform .15s, border-color .2s, box-shadow .2s;
    position: relative;
  }
  .school-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--accent-light); }
  .school-card.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(220,38,38,.12); }

  .school-card .rank-badge {
    position: absolute; top: -8px; left: 16px;
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
  }
  .rank-gold { background: linear-gradient(135deg, #f59e0b, #d97706); }
  .rank-silver { background: linear-gradient(135deg, #94a3b8, #64748b); }
  .rank-bronze { background: linear-gradient(135deg, #d97706, #92400e); }

  .school-card .s-name { font-size: 15px; font-weight: 600; margin-left: 22px; }
  .school-card .s-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .school-card .s-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 20px;
    font-weight: 600; line-height: 1.5;
  }
  .tag-region { background: #f1f5f9; color: var(--text-secondary); }
  .tag-sap { background: #fef3c7; color: #92400e; }
  .tag-gep { background: #dbeafe; color: #1e40af; }
  .tag-girls { background: #fce7f3; color: #9d174d; }
  .tag-boys { background: #dbeafe; color: #1e40af; }
  .tag-aided { background: #ecfdf5; color: #065f46; }

  .school-card .s-stats {
    display: flex; gap: 16px; margin-top: 10px; font-size: 12px;
  }
  .school-card .s-stat { display: flex; flex-direction: column; }
  .school-card .s-stat .s-val { font-weight: 700; font-size: 16px; color: var(--accent); }
  .school-card .s-stat .s-label { color: var(--text-tertiary); font-size: 10px; }

  .school-card .s-addr {
    font-size: 11px; color: var(--text-tertiary); margin-top: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Property Panel */
  .prop-panel { display: none; animation: fadeUp .3s ease; }
  .prop-panel.show { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .prop-panel .school-detail {
    display: flex; gap: 16px; flex-wrap: wrap; padding: 16px;
    background: linear-gradient(135deg, #fff1f2, #ffe4e6);
    border-radius: 10px; margin-bottom: 16px; border: 1px solid #fecaca;
  }
  .prop-panel .school-detail .sd-item { flex: 1; min-width: 120px; text-align: center; }
  .prop-panel .school-detail .sd-val { font-size: 18px; font-weight: 700; color: var(--accent); }
  .prop-panel .school-detail .sd-label { font-size: 11px; color: var(--text-secondary); }

  .prop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .prop-card {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: border-color .2s;
  }
  .prop-card:hover { border-color: var(--primary); }

  .prop-card .p-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .prop-card .p-type {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    font-weight: 700; color: #fff;
  }
  .p-type-condo { background: var(--condo); }
  .p-type-hdb { background: var(--hdb); }
  .p-type-ec { background: var(--ec); }

  .prop-card .p-name { font-size: 14px; font-weight: 600; flex: 1; }
  .prop-card .p-details { font-size: 12px; color: var(--text-secondary); line-height: 1.7; }
  .prop-card .p-details span { color: var(--text); font-weight: 600; }

  .prop-card .p-price-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
  }
  .prop-card .p-price { font-size: 15px; font-weight: 700; color: var(--primary-dark); }
  .prop-card .p-psf { font-size: 11px; color: var(--text-secondary); }
  .prop-card .p-dist {
    font-size: 10px; color: var(--success); font-weight: 600;
    background: #ecfdf5; padding: 2px 8px; border-radius: 20px;
  }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--text-secondary); font-size: 13px;
    cursor: pointer; font-family: inherit; margin-bottom: 16px;
    transition: background .15s;
  }
  .back-btn:hover { background: var(--surface-alt); }

  footer {
    text-align: center; margin-top: 36px; font-size: 12px;
    color: var(--text-secondary); line-height: 1.8;
  }

  @media (max-width: 640px) {
    .school-grid { grid-template-columns: 1fr; }
    .prop-grid { grid-template-columns: 1fr; }
    #map { height: 300px; }
    .school-detail { flex-direction: column; }
  }

  .leaflet-popup-content { font-family: inherit; font-size: 13px; line-height: 1.5; }
  .leaflet-popup-content b { color: var(--accent); }
</style>
</head>

/* ═══════════════════════════════════════════════════════════════
   MAP & UI

let map, schoolMarkers = [], propMarkers = [], circleLayer = null;
let activeSchoolIdx = null;

function initMap() {
  map = L.map('map').setView([1.3521, 103.8198], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 18
  }).addTo(map);

  SCHOOLS.forEach((s, i) => {
    const color = s.rank <= 5 ? '#d97706' : s.rank <= 10 ? '#64748b' : '#92400e';
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:26px;height:26px;border-radius:50%;background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);">${s.rank}</div>`,
      iconSize: [26, 26],
      iconAnchor: [13, 13]
    });
    const m = L.marker([s.lat, s.lng], { icon })
      .addTo(map)
      .bindPopup(`<b>#${s.rank} ${s.name}</b><br>${s.nameZh}<br><small>${s.town} · 竞争比 ${s.ratio}</small>`);
    m.on('click', () => showProperties(i));
    schoolMarkers.push(m);
  });
}

function showPropsOnMap(school) {
  propMarkers.forEach(m => map.removeLayer(m));
  propMarkers = [];
  if (circleLayer) map.removeLayer(circleLayer);

  circleLayer = L.circle([school.lat, school.lng], {
    radius: 1000, color: '#dc2626', fillColor: '#dc2626',
    fillOpacity: 0.06, weight: 2, dashArray: '6 4'
  }).addTo(map);

  const typeFilter = document.getElementById('filterPropType').value;
  school.properties.forEach(p => {
    if (typeFilter !== 'all' && p.type !== typeFilter) return;
    const c = p.type === 'HDB' ? '#0ea5e9' : p.type === 'EC' ? '#d946ef' : '#8b5cf6';
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:12px;height:12px;border-radius:50%;background:${c};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);"></div>`,
      iconSize: [12, 12], iconAnchor: [6, 6]
    });
    const m = L.marker([p.lat, p.lng], { icon })
      .addTo(map)
      .bindPopup(`<b>${p.name}</b><br>${p.type} · ${p.tenure}<br>~${p.price} · ${p.dist}`);
    propMarkers.push(m);
  });

  map.flyTo([school.lat, school.lng], 15, { duration: 0.8 });
}

/* ─── rendering ─── */

function renderSchools() {
  const region = document.getElementById('filterRegion').value;
  const grid = document.getElementById('schoolGrid');
  const filtered = SCHOOLS.filter(s => region === 'all' || s.region === region);

  document.getElementById('filterCount').textContent = `${filtered.length} 所学校`;
  document.getElementById('schoolList').style.display = '';
  document.getElementById('propPanel').classList.remove('show');
  activeSchoolIdx = null;

  propMarkers.forEach(m => map.removeLayer(m));
  propMarkers = [];
  if (circleLayer) { map.removeLayer(circleLayer); circleLayer = null; }
  map.flyTo([1.3521, 103.8198], 12, { duration: 0.5 });

  grid.innerHTML = filtered.map((s, i) => {
    const idx = SCHOOLS.indexOf(s);
    const rankClass = s.rank <= 5 ? 'rank-gold' : s.rank <= 10 ? 'rank-silver' : 'rank-bronze';
    let tags = `<span class="s-tag tag-region">${s.town}</span>`;
    if (s.sap) tags += '<span class="s-tag tag-sap">SAP</span>';
    if (s.gep) tags += '<span class="s-tag tag-gep">GEP</span>';
    if (s.gender === 'Girls') tags += '<span class="s-tag tag-girls">女校</span>';
    if (s.type === 'Govt-aided') tags += '<span class="s-tag tag-aided">政府资助</span>';

    return `<div class="school-card" onclick="showProperties(${idx})">
      <span class="rank-badge ${rankClass}">${s.rank}</span>
      <div class="s-name">${s.name}</div>
      <div style="font-size:12px;color:var(--text-secondary);margin-left:22px;">${s.nameZh}</div>
      <div class="s-meta">${tags}</div>
      <div class="s-stats">
        <div class="s-stat"><span class="s-val">${s.ratio}</span><span class="s-label">竞争比 Ratio</span></div>
        <div class="s-stat"><span class="s-val">${s.applicants}</span><span class="s-label">申请人 Apps</span></div>
        <div class="s-stat"><span class="s-val">${s.vacancies}</span><span class="s-label">空位 Vac</span></div>
        <div class="s-stat"><span class="s-val">${s.properties.length}</span><span class="s-label">楼盘 Props</span></div>
      </div>
      <div class="s-addr">📍 ${s.addr}</div>
    </div>`;
  }).join('');
}

function showProperties(idx) {
  activeSchoolIdx = idx;
  const s = SCHOOLS[idx];
  const typeFilter = document.getElementById('filterPropType').value;
  const props = s.properties.filter(p => typeFilter === 'all' || p.type === typeFilter);

  document.getElementById('schoolList').style.display = 'none';
  const panel = document.getElementById('propPanel');
  panel.classList.add('show');

  showPropsOnMap(s);

  const condoCount = s.properties.filter(p => p.type === 'Condo').length;
  const hdbCount = s.properties.filter(p => p.type === 'HDB').length;
  const ecCount = s.properties.filter(p => p.type === 'EC').length;

  let tags = '';
  if (s.sap) tags += '<span class="s-tag tag-sap" style="font-size:12px;">SAP</span>';
  if (s.gep) tags += '<span class="s-tag tag-gep" style="font-size:12px;">GEP</span>';
  if (s.gender === 'Girls') tags += '<span class="s-tag tag-girls" style="font-size:12px;">女校</span>';

  document.getElementById('propContent').innerHTML = `
    <div class="card">
      <div class="card-title">
        <span class="icon" style="background:#fef2f2;color:var(--accent)">🏫</span>
        #${s.rank} ${s.name} · ${s.nameZh} ${tags}
      </div>
      <div class="school-detail">
        <div class="sd-item"><div class="sd-val">${s.ratio}</div><div class="sd-label">竞争比 Ratio</div></div>
        <div class="sd-item"><div class="sd-val">${s.applicants}</div><div class="sd-label">Phase 2C 申请人</div></div>
        <div class="sd-item"><div class="sd-val">${s.vacancies}</div><div class="sd-label">Phase 2C 空位</div></div>
        <div class="sd-item"><div class="sd-val">${condoCount}/${hdbCount}/${ecCount}</div><div class="sd-label">Condo/HDB/EC</div></div>
      </div>
      <div style="font-size:13px;color:var(--text-secondary);margin-top:8px;">
        <b>📍 地址:</b> ${s.addr}<br>
        <b>📋 类型:</b> ${s.type} · ${s.gender}<br>
        <b>💡 特点:</b> ${s.note}
      </div>
    </div>
    <div class="card">
      <div class="card-title">
        <span class="icon" style="background:#f0fdf4;color:var(--success)">🏠</span>
        1公里内热门楼盘 Nearby Properties (${props.length})
      </div>
      <div class="prop-grid">
        ${props.map(p => {
          const typeClass = p.type === 'HDB' ? 'p-type-hdb' : p.type === 'EC' ? 'p-type-ec' : 'p-type-condo';
          const txnLabel = p.txns > 0 ? `近期 ${p.txns} 笔交易` : '新盘预售中';
          return `<div class="prop-card">
            <div class="p-header">
              <span class="p-type ${typeClass}">${p.type}</span>
              <span class="p-name">${p.name}</span>
            </div>
            <div class="p-details">
              <b>产权:</b> ${p.tenure} · <b>建成:</b> ${p.top > 2026 ? p.top + ' (预计)' : p.top}<br>
              ${p.units > 0 ? `<b>总户数:</b> ${p.units} · ` : ''}<b>交易:</b> <span>${txnLabel}</span>
            </div>
            <div class="p-price-bar">
              <span class="p-price">${p.price}</span>
              <span class="p-psf">~$${p.avgPsf} psf</span>
              <span class="p-dist">📍 ${p.dist}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
      ${props.length === 0 ? '<p style="color:var(--text-tertiary);font-size:13px;text-align:center;padding:20px;">当前筛选条件下无匹配房产</p>' : ''}
    </div>`;

  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderProperties() {
  if (activeSchoolIdx !== null) {
    showProperties(activeSchoolIdx);
  }
}

function showSchoolList() {
  renderSchools();
}

/* ─── init ─── */
initMap();
renderSchools();
</script>
</body>
</html>
