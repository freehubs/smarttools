<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter — SmartTools</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    .json-key { color: #e06c75; }
    .json-string { color: #98c379; }
    .json-number { color: #d19a66; }
    .json-boolean { color: #c678dd; }
    .json-null { color: #c678dd; }

    @media (prefers-color-scheme: light) {
      .json-key { color: #d73a49; }
      .json-string { color: #22863a; }
      .json-number { color: #005cc5; }
      .json-boolean { color: #6f42c1; }
      .json-null { color: #6f42c1; }
    }

    #input { min-height: 400px; }
    #output { min-height: 400px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="logo">&#9881; SmartTools</a>
      <a href="../index.html" class="back-link">&larr; All Tools</a>
    </div>
  </nav>

  <main class="container">
    <div class="tool-header">
      <h1>JSON Formatter</h1>
      <p>Paste JSON to pretty-print, minify, or validate it with syntax highlighting.</p>
    </div>

    <div class="btn-group mb-2">
      <button class="btn btn-primary" onclick="formatJSON()">Format</button>
      <button class="btn btn-secondary" onclick="minifyJSON()">Minify</button>
      <button class="btn btn-secondary" onclick="copyOutput()">Copy Result</button>
      <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
    </div>

    <div id="error" class="alert alert-error hidden"></div>

    <div class="split-panel">
      <div>
        <label for="input">Input</label>
        <textarea id="input" placeholder='Paste your JSON here...\n\nExample: {"name": "Alice", "age": 30}'
          oninput="autoFormat()"></textarea>
      </div>
      <div>
        <label>Output</label>
        <div id="output" class="code-output" tabindex="0">Formatted JSON will appear here...</div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>SmartTools &mdash; <a href="../index.html">Home</a></p>
  </footer>

  <script>
    const inputEl = document.getElementById('input');
    const outputEl = document.getElementById('output');
    const errorEl = document.getElementById('error');

    let rawFormatted = '';

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
    }

    function hideError() {
      errorEl.classList.add('hidden');
    }

    function syntaxHighlight(json) {
      json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return json.replace(
        /("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        function (match) {
          let cls = 'json-number';
          if (/^"/.test(match)) {
            cls = /:$/.test(match) ? 'json-key' : 'json-string';
          } else if (/true|false/.test(match)) {
            cls = 'json-boolean';
          } else if (/null/.test(match)) {
            cls = 'json-null';
          }
          return '<span class="' + cls + '">' + match + '</span>';
        }
      );
    }

    function formatJSON() {
      hideError();
      const input = inputEl.value.trim();
      if (!input) {
        outputEl.innerHTML = 'Formatted JSON will appear here...';
        rawFormatted = '';
        return;
      }
      try {
        const obj = JSON.parse(input);
        const formatted = JSON.stringify(obj, null, 2);
        rawFormatted = formatted;
        outputEl.innerHTML = syntaxHighlight(formatted);
      } catch (e) {
        showError('Invalid JSON: ' + e.message);
        outputEl.innerHTML = '';
        rawFormatted = '';
      }
    }

    function minifyJSON() {
      hideError();
      const input = inputEl.value.trim();
      if (!input) return;
      try {
        const obj = JSON.parse(input);
        const minified = JSON.stringify(obj);
        rawFormatted = minified;
        outputEl.innerHTML = syntaxHighlight(minified);
      } catch (e) {
        showError('Invalid JSON: ' + e.message);
      }
    }

    function copyOutput() {
      if (!rawFormatted) return;
      navigator.clipboard.writeText(rawFormatted).then(() => {
        const btn = event.target;
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = original, 1500);
      });
    }

    function clearAll() {
      inputEl.value = '';
      outputEl.innerHTML = 'Formatted JSON will appear here...';
      rawFormatted = '';
      hideError();
    }

    let debounceTimer;
    function autoFormat() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(formatJSON, 400);
    }
  </script>
</body>
</html>
